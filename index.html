<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMSS Exam System - Desktop Version</title>
    
    <script src="questions.js"></script>
    <script src="biology.js"></script><script src="chemistry.js"></script><script src="physics.js"></script>
    <script src="history.js"></script><script src="geography.js"></script><script src="economics.js"></script>
    <script src="english.js"></script><script src="maths.js"></script>
    <script src="biology_model.js"></script><script src="chemistry_model.js"></script><script src="physics_model.js"></script>
    <script src="history_model.js"></script><script src="geography_model.js"></script><script src="economics_model.js"></script>
    <script src="english_model.js"></script><script src="maths_model.js"></script><script src="aptitude_model.js"></script>

    <style>
        :root {
            --nat-grad: linear-gradient(135deg, #00d2ff, #3a7bd5);
            --soc-grad: linear-gradient(135deg, #f2994a, #f2c94c);
            --mod-grad: linear-gradient(135deg, #8e2de2, #4a00e0);
            --bg: #0f172a; --glass: rgba(255, 255, 255, 0.1); --text: white;
            --accent: #00d2ff; --correct: #22c55e; --wrong: #ef4444;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; height: 100vh; overflow: hidden; }
        
        .page { display: none; height: 100vh; width: 100%; padding: 40px; flex-direction: column; align-items: center; overflow-y: auto; }
        .active { display: flex; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .exam-container { display: flex; gap: 30px; width: 100%; max-width: 1400px; height: 75vh; margin-top: 10px; }
        .q-area { flex: 2.5; background: var(--glass); border-radius: 20px; padding: 40px; overflow-y: auto; border: 1px solid rgba(255,255,255,0.1); }
        .grid-sidebar { flex: 1; background: rgba(0,0,0,0.3); border-radius: 20px; padding: 20px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; overflow-y: auto; height: 100%; border: 1px solid rgba(255,255,255,0.1); }

        .card { padding: 35px; border-radius: 20px; text-align: center; font-size: 24px; font-weight: 900; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; width: 100%; transition: 0.3s; background: var(--glass); }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); filter: brightness(1.2); }

        .q-box { background: #f8fafc; color: #0f172a; padding: 30px; border-radius: 15px; font-size: 24px; font-weight: 700; margin-bottom: 25px; }
        .opt { background: #334155; color: white; padding: 18px; margin: 12px 0; border-radius: 12px; font-size: 20px; cursor: pointer; transition: 0.2s; border: 2px solid transparent; }
        .opt:hover { background: #475569; border-color: var(--accent); }
        .opt.selected { background: var(--accent); color: #0f172a; font-weight: 800; }

        .grid-num { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; background: #1e293b; border-radius: 8px; font-weight: bold; cursor: pointer; color: #94a3b8; border: 1px solid #475569; }
        .grid-num.answered { background: var(--correct) !important; color: white; border: none; }
        .grid-num.skipped { background: var(--wrong) !important; color: white; border: none; }
        .grid-num.current { border: 3px solid var(--accent); color: var(--accent); transform: scale(1.05); }

        .btn { padding: 15px 30px; border-radius: 12px; border: none; font-size: 18px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-main { background: var(--accent); color: #0f172a; }
        .btn-back { position: fixed; top: 20px; left: 20px; background: var(--glass); color: white; padding: 10px 20px; border-radius: 10px; cursor: pointer; z-index: 1000; }

        .review-item { width: 100%; max-width: 900px; background: var(--glass); padding: 25px; border-radius: 15px; margin-bottom: 20px; border-left: 8px solid var(--wrong); }
        .review-item.is-correct { border-left-color: var(--correct); }
        
        #timer { font-size: 32px; font-weight: 900; color: #fbbf24; font-family: monospace; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="p-splash" class="page active">
        <h1 style="font-size: 50px;">🎓 </h1>
        <h2 style="text-align: center;">እንኳን ወደ መርጡለ ማርያም 2ኛ ደረጃ ትምህርት ቤት የፈተና መማመጃ ሲስተም በደህና መጡ!</h2>
        <p style="font-size: 20px; color: var(--accent);">አዘጋጅ: በረከት ቀናው 
        
        
        
        
        
        
        
        (Grade 11 Student) 2018 </p>
        <button class="btn btn-main" style="width: 250px;" onclick="doLogin()">ይግቡ (ENTER)</button>
    </div>

    <div id="p-stream" class="page">
        <h1>ዘርፍ ይምረጡ</h1>
        <div style="display: flex; gap: 20px; width: 100%; max-width: 1000px;">
            <div class="card" style="background:var(--nat-grad)" onclick="showSubs('Natural')">🧬 NATURAL SCIENCE</div>
            <div class="card" style="background:var(--soc-grad)" onclick="showSubs('Social')">🌍 SOCIAL SCIENCE</div>
        </div>
        <div class="card" style="background:var(--mod-grad); margin-top: 20px; max-width: 1000px;" onclick="nav('p-model-types')">📝 MODEL EXAMS</div>
    </div>

    <div id="p-model-types" class="page">
        <div class="btn-back" onclick="nav('p-stream')">ተመለስ</div>
        <h1>የሞዴል ዘርፍ</h1>
        <div style="display: flex; gap: 20px; width: 100%; max-width: 1000px;">
            <div class="card" style="background:var(--nat-grad)" onclick="showSubs('Model_Natural')">🧬 NATURAL MODELS</div>
            <div class="card" style="background:var(--soc-grad)" onclick="showSubs('Model_Social')">🌍 SOCIAL MODELS</div>
        </div>
    </div>

    <div id="p-subs" class="page">
        <div class="btn-back" onclick="goBackFromSubs()">ተመለስ</div>
        <h1 id="txt-stream"></h1>
        <div id="list-subs" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 900px;"></div>
    </div>

    <div id="p-years" class="page">
        <div class="btn-back" onclick="nav('p-subs')">ተመለስ</div>
        <h1 id="txt-sub" style="color: var(--accent);"></h1>
        <div id="year-btns" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:15px; width:100%; max-width:800px;"></div>
    </div>

    <div id="p-exam" class="page" style="padding: 15px;">
        <div style="width:100%; display:flex; justify-content:space-between; align-items:center; padding: 0 40px;">
            <div id="timer">⏱ 100:00</div>
            <h2 id="q-num-top">ጥያቄ 1</h2>
            <button class="btn" style="background:var(--wrong); color:white;" onclick="quitExam()">QUIT</button>
        </div>
        <div class="exam-container">
            <div class="q-area">
                <div id="q-txt" class="q-box"></div>
                <div id="opt-list"></div>
                <div style="display:flex; gap:20px; margin-top:20px;">
                    <button class="btn" style="background:#475569; color:white; flex:1;" onclick="moveQ(-1)">PREVIOUS (←)</button>
                    <button id="btn-next" class="btn btn-main" style="flex:2;" onclick="moveQ(1)">NEXT (→)</button>
                </div>
            </div>
            <div class="grid-sidebar" id="q-grid"></div>
        </div>
    </div>

    <div id="p-result" class="page">
        <h1>ፈተናውን ጨርሰዋል!</h1>
        <div id="score-txt" style="font-size:80px; font-weight:900; color:var(--accent);">0/0</div>
        <div style="display:flex; gap:20px;">
            <button class="btn btn-main" onclick="showReview()">የመልስ ማብራሪያ (REVIEW)</button>
            <button class="btn" style="background:#475569; color:white;" onclick="nav('p-years')">ተመለስ</button>
        </div>
    </div>

    <div id="p-review" class="page">
        <div class="btn-back" onclick="nav('p-result')">ተመለስ</div>
        <h1>የመልስ ማብራሪያ (Review)</h1>
        <div id="review-list" style="width:100%; display:flex; flex-direction:column; align-items:center;"></div>
    </div>

    <script>
        let curStr = '', curSub = '', examSet = [], userAns = [], qIdx = 0, timer = null, isModel = false;

        document.onkeydown = (e) => {
            if(e.key === "Enter" && document.getElementById('p-splash').classList.contains('active')) doLogin();
            if(!document.getElementById('p-exam').classList.contains('active')) return;
            if(e.key === "ArrowRight") moveQ(1);
            if(e.key === "ArrowLeft") moveQ(-1);
            ['a','b','c','d'].forEach((k, i) => { if(e.key.toLowerCase() === k) selectOpt(i); });
        };

        function nav(id) { 
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); 
            document.getElementById(id).classList.add('active'); 
        }

        function goBackFromSubs() { isModel ? nav('p-model-types') : nav('p-stream'); }

        function doLogin() {
            if(localStorage.getItem('mmss_logged') === 'YES') { nav('p-stream'); return; }
            let p = prompt("PASSWORD:");
            if(p === "Bereket2127") { localStorage.setItem('mmss_logged', 'YES'); nav('p-stream'); }
            else { alert("WRONG PASSWORD!"); }
        }

        function showSubs(str) {
            curStr = str; isModel = str.includes('Model_');
            document.getElementById('txt-stream').innerText = isModel ? str.replace('Model_', '') + " MODELS" : str + " SUBJECTS";
            let list = document.getElementById('list-subs'); list.innerHTML = "";
            let subjects = isModel ? Object.keys(QUESTIONS_DB.ModelExams[str.split('_')[1]] || {}) : [...new Set([...Object.keys(QUESTIONS_DB[str]||{}), ...Object.keys(QUESTIONS_DB.Common||{})])];
            subjects.forEach(s => {
                let d = document.createElement('div'); d.className = "card"; d.innerHTML = `📚 ${s.toUpperCase()}`;
                d.onclick = () => { curSub = s; showYears(); }; 
                list.appendChild(d);
            });
            nav('p-subs');
        }

        function showYears() {
            document.getElementById('txt-sub').innerText = curSub.toUpperCase();
            let container = document.getElementById('year-btns'); container.innerHTML = "";
            let data = isModel ? QUESTIONS_DB.ModelExams[curStr.split('_')[1]][curSub] : (QUESTIONS_DB.Common[curSub] || QUESTIONS_DB[curStr][curSub]);
            if (data) {
                Object.keys(data).forEach(key => {
                    if(data[key].length > 0) {
                        let btn = document.createElement('button'); btn.className = "btn"; btn.style.background = "var(--glass)"; btn.style.color = "white";
                        btn.innerText = isModel ? key.replace(/_/g, ' ') : key + " E.C";
                        btn.onclick = () => startExam(data[key]); container.appendChild(btn);
                    }
                });
            }
            nav('p-years');
        }

        function startExam(data) {
            examSet = data; userAns = new Array(data.length).fill(null); qIdx = 0;
            buildGrid(); renderQ(); startTimer(100); nav('p-exam');
        }

        function buildGrid() {
            const grid = document.getElementById('q-grid'); grid.innerHTML = "";
            examSet.forEach((_, i) => {
                let b = document.createElement('button'); b.className = "grid-num"; b.id = `gn-${i}`; b.innerText = i + 1;
                b.onclick = () => { qIdx = i; renderQ(); }; grid.appendChild(b);
            });
        }

        function renderQ() {
            let item = examSet[qIdx];
            document.getElementById('q-num-top').innerText = `ጥያቄ ${qIdx + 1} ከ ${examSet.length}`;
            document.getElementById('q-txt').innerText = item.q;
            let list = document.getElementById('opt-list'); list.innerHTML = "";
            item.opts.forEach((o, i) => {
                let d = document.createElement('div'); d.className = "opt" + (userAns[qIdx] === i ? " selected" : "");
                d.innerHTML = `<b>${String.fromCharCode(65+i)}.</b> ${o.replace(/\*\*/g, '')}`;
                d.onclick = () => selectOpt(i);
                list.appendChild(d);
            });
            document.querySelectorAll('.grid-num').forEach(el => el.classList.remove('current'));
            document.getElementById(`gn-${qIdx}`).classList.add('current');
            document.getElementById('btn-next').innerText = (qIdx === examSet.length - 1) ? "ጨርስ (FINISH)" : "ቀጣይ (→)";
        }

        function selectOpt(i) {
            userAns[qIdx] = i; 
            document.getElementById(`gn-${qIdx}`).className = "grid-num answered"; 
            renderQ();
        }

        function moveQ(n) {
            if(n > 0 && userAns[qIdx] === null) document.getElementById(`gn-${qIdx}`).className = "grid-num skipped";
            if(n > 0 && qIdx === examSet.length - 1) { if(confirm("መጨረስ ይፈልጋሉ?")) finishExam(); return; }
            qIdx += n; if(qIdx < 0) qIdx = 0; if(qIdx >= examSet.length) qIdx = examSet.length -1;
            renderQ();
        }

        function quitExam() {
            if(confirm("ፈተናውን አቋርጠው ወደ ዓመተ ምህረት ምርጫ መመለስ ይፈልጋሉ?")) {
                clearInterval(timer); nav('p-years');
            }
        }

        function startTimer(m) {
            let s = m * 60; if(timer) clearInterval(timer);
            timer = setInterval(() => {
                let mm = Math.floor(s/60), ss = s % 60;
                document.getElementById('timer').innerText = `⏱ ${mm}:${ss<10?'0':''}${ss}`;
                if(s-- <= 0) { clearInterval(timer); finishExam(); }
            }, 1000);
        }

        function finishExam() {
            clearInterval(timer); let score = 0;
            examSet.forEach((item, i) => {
                let correctIdx = item.opts.findIndex(o => o.includes('**'));
                if(userAns[i] === correctIdx) score++;
            });
            document.getElementById('score-txt').innerText = `${score} / ${examSet.length}`;
            nav('p-result');
        }

        function showReview() {
            const list = document.getElementById('review-list'); list.innerHTML = "";
            examSet.forEach((item, i) => {
                let correctIdx = item.opts.findIndex(o => o.includes('**'));
                let correctText = item.opts[correctIdx].replace(/\*\*/g, '');
                let userText = userAns[i] !== null ? item.opts[userAns[i]].replace(/\*\*/g, '') : "አልተመለሰም";
                let isCorrect = userAns[i] === correctIdx;

                let div = document.createElement('div');
                div.className = "review-item " + (isCorrect ? "is-correct" : "");
                div.innerHTML = `
                    <p style="font-weight:bold; color:var(--accent);">ጥያቄ ${i+1}: ${item.q}</p>
                    <p style="color:${isCorrect ? 'var(--correct)' : 'var(--wrong)'}">
                        የመረጥከው መልስ፦ <b>${userText}</b>
                    </p>
                    ${!isCorrect ? `<p style="color:var(--correct)">ትክክለኛው መልስ፦ <b>${correctText}</b></p>` : ""}
                `;
                list.appendChild(div);
            });
            nav('p-review');
        }
    </script>
</body>
</html>
